name: Apple CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
  LANG: en_US.UTF-8
  TZ: America/Los_Angeles

jobs:
  source-gates:
    name: Source gates
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record toolchain
        run: xcodebuild -version

      - name: Validate shell syntax
        run: |
          for script in Scripts/*.sh AgentLimits/Scripts/*.sh; do
            bash -n "$script"
          done

      - name: Validate property lists and privacy manifests
        run: |
          while IFS= read -r -d '' plist; do
            plutil -lint "$plist"
          done < <(find . -path './.git' -prune -o -type f \
            \( -name '*.plist' -o -name '*.xcprivacy' -o -name '*.entitlements' \) \
            -print0)

      - name: Reject whitespace errors
        env:
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            comparison_base="$(git merge-base "origin/$BASE_REF" HEAD)"
          elif [[ -n "$BEFORE_SHA" && ! "$BEFORE_SHA" =~ ^0+$ ]]; then
            comparison_base="$BEFORE_SHA"
          else
            comparison_base="HEAD^"
          fi
          git diff --check "$comparison_base" HEAD

      - name: Reject common committed secrets
        run: |
          if git grep -nE '(ghp_[[:alnum:]]{20,}|github_pat_[[:alnum:]_]{20,}|-----BEGIN ((RSA|EC|OPENSSH|ENCRYPTED) )?PRIVATE KEY-----)' -- .; then
            echo 'Possible credential or private key committed to source.' >&2
            exit 1
          fi

      - name: Reject committed Apple credential artifacts
        run: Scripts/reject-apple-credential-artifacts.sh

  tests:
    name: Test — ${{ matrix.name }}
    needs: source-gates
    runs-on: macos-26
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            scheme: AgentLimits
            configuration: Debug
            destination: platform=macOS
            result: macOS
            code_signing_allowed: "NO"
            code_signing_required: "NO"
            code_sign_identity: ""
            development_team: ""
          - name: macOS UI
            scheme: AgentLimitsUITests
            configuration: UI Testing
            destination: platform=macOS,arch=arm64
            result: Mac-UI
            code_signing_allowed: "YES"
            code_signing_required: "YES"
            code_sign_identity: "-"
            development_team: ""
          - name: iPhone
            scheme: AgentLimitsiOS
            configuration: Debug
            destination: ""
            device_name: iPhone 17 Pro
            result: iPhone
            code_signing_allowed: "NO"
            code_signing_required: "NO"
            code_sign_identity: ""
            development_team: ""
          - name: iPad
            scheme: AgentLimitsiOS
            configuration: Debug
            destination: ""
            device_name: iPad Pro 13-inch (M5)
            result: iPad
            code_signing_allowed: "NO"
            code_signing_required: "NO"
            code_sign_identity: ""
            development_team: ""
          - name: Apple Watch
            scheme: AgentLimitsWatch
            configuration: Debug
            destination: ""
            result: Watch
            code_signing_allowed: "NO"
            code_signing_required: "NO"
            code_sign_identity: ""
            development_team: ""
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Provision dedicated iOS simulator
        if: ${{ matrix.result == 'iPhone' || matrix.result == 'iPad' }}
        id: ios-destination
        env:
          IOS_DEVICE_NAME: ${{ matrix.device_name }}
        run: |
          set -euo pipefail

          destination="$(Scripts/create-ci-ios-simulator.sh "$IOS_DEVICE_NAME")"
          destination_pattern='^platform=iOS Simulator,id=([0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}),arch=arm64$'
          if [[ ! "$destination" =~ $destination_pattern ]]; then
            echo "Invalid dedicated iOS simulator destination: $destination" >&2
            exit 65
          fi
          udid="${BASH_REMATCH[1]}"
          printf 'destination=%s\nudid=%s\n' \
            "$destination" "$udid" >> "$GITHUB_OUTPUT"

      - name: Build iOS tests
        if: ${{ matrix.result == 'iPhone' || matrix.result == 'iPad' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          CODE_SIGNING_ALLOWED_VALUE: ${{ matrix.code_signing_allowed }}
          CODE_SIGNING_REQUIRED_VALUE: ${{ matrix.code_signing_required }}
          CODE_SIGN_IDENTITY_VALUE: ${{ matrix.code_sign_identity }}
          DEVELOPMENT_TEAM_VALUE: ${{ matrix.development_team }}
          IOS_DESTINATION: ${{ steps.ios-destination.outputs.destination }}
          TEST_RESULT: ${{ matrix.result }}
        run: |
          set -euo pipefail

          if [[ -z "$IOS_DESTINATION" ]]; then
            echo "No dedicated iOS destination was resolved for $TEST_RESULT." >&2
            exit 69
          fi
          xcodebuild build-for-testing \
            -project AgentLimits.xcodeproj \
            -scheme AgentLimitsiOS \
            -configuration "$CONFIGURATION" \
            -destination "$IOS_DESTINATION" \
            -parallel-testing-enabled NO \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/${TEST_RESULT}-build.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-${TEST_RESULT}" \
            CODE_SIGNING_ALLOWED="$CODE_SIGNING_ALLOWED_VALUE" \
            CODE_SIGNING_REQUIRED="$CODE_SIGNING_REQUIRED_VALUE" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_VALUE" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_VALUE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Install and prelaunch iOS test host
        if: ${{ matrix.result == 'iPhone' || matrix.result == 'iPad' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          IOS_SIMULATOR_UDID: ${{ steps.ios-destination.outputs.udid }}
          TEST_RESULT: ${{ matrix.result }}
        run: |
          set -euo pipefail

          uuid_pattern='^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
          if [[ ! "$IOS_SIMULATOR_UDID" =~ $uuid_pattern ]]; then
            echo "Invalid dedicated iOS simulator UDID: $IOS_SIMULATOR_UDID" >&2
            exit 65
          fi
          expected_bundle_id='com.jimboha.agentlimits.ios'
          ios_app="$RUNNER_TEMP/DerivedData-${TEST_RESULT}/Build/Products/$CONFIGURATION-iphonesimulator/AgentLimits.app"
          if [[ ! -d "$ios_app" ]]; then
            echo "Built iOS test host is missing: $ios_app" >&2
            exit 66
          fi
          built_bundle_id="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleIdentifier' \
              "$ios_app/Info.plist"
          )"
          if [[ "$built_bundle_id" != "$expected_bundle_id" ]]; then
            echo "Unexpected built iOS bundle identifier: $built_bundle_id" >&2
            exit 65
          fi

          xcrun simctl install "$IOS_SIMULATOR_UDID" "$ios_app"
          installed_app=''
          for (( readiness_attempt = 1; readiness_attempt <= 30; readiness_attempt++ )); do
            if installed_app="$(
              xcrun simctl get_app_container \
                "$IOS_SIMULATOR_UDID" \
                "$expected_bundle_id" \
                app 2>/dev/null
            )" && [[ -d "$installed_app" ]]; then
              break
            fi
            installed_app=''
            sleep 1
          done
          if [[ -z "$installed_app" ]]; then
            echo "Installed iOS test host was not registered: $expected_bundle_id" >&2
            exit 69
          fi
          installed_bundle_id="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleIdentifier' \
              "$installed_app/Info.plist"
          )"
          if [[ "$installed_bundle_id" != "$expected_bundle_id" ]]; then
            echo "Unexpected installed iOS bundle identifier: $installed_bundle_id" >&2
            exit 65
          fi
          xcrun simctl launch \
            --arch=arm64 \
            --terminate-running-process \
            "$IOS_SIMULATOR_UDID" \
            "$expected_bundle_id" \
            -ui-testing-reset
          xcrun simctl terminate \
            "$IOS_SIMULATOR_UDID" \
            "$expected_bundle_id"

      - name: Run iOS tests
        if: ${{ matrix.result == 'iPhone' || matrix.result == 'iPad' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          CODE_SIGNING_ALLOWED_VALUE: ${{ matrix.code_signing_allowed }}
          CODE_SIGNING_REQUIRED_VALUE: ${{ matrix.code_signing_required }}
          CODE_SIGN_IDENTITY_VALUE: ${{ matrix.code_sign_identity }}
          DEVELOPMENT_TEAM_VALUE: ${{ matrix.development_team }}
          IOS_DESTINATION: ${{ steps.ios-destination.outputs.destination }}
          TEST_RESULT: ${{ matrix.result }}
        run: |
          set -euo pipefail

          if [[ -z "$IOS_DESTINATION" ]]; then
            echo "No dedicated iOS destination was resolved for $TEST_RESULT." >&2
            exit 69
          fi
          xcodebuild test-without-building \
            -project AgentLimits.xcodeproj \
            -scheme AgentLimitsiOS \
            -configuration "$CONFIGURATION" \
            -destination "$IOS_DESTINATION" \
            -parallel-testing-enabled NO \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/${TEST_RESULT}.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-${TEST_RESULT}" \
            CODE_SIGNING_ALLOWED="$CODE_SIGNING_ALLOWED_VALUE" \
            CODE_SIGNING_REQUIRED="$CODE_SIGNING_REQUIRED_VALUE" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_VALUE" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_VALUE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Provision dedicated Apple Watch pair
        if: ${{ matrix.result == 'Watch' }}
        id: watch-pair
        env:
          PHONE_DEVICE_NAME: iPhone 17 Pro
          WATCH_DEVICE_NAME: Apple Watch Series 11 (46mm)
        run: |
          set -euo pipefail

          pair_json="$(
            Scripts/create-ci-watch-pair.sh \
              "$PHONE_DEVICE_NAME" \
              "$WATCH_DEVICE_NAME"
          )"
          destination="$(jq -er '.destination' <<< "$pair_json")"
          pair_udid="$(jq -er '.pair_udid' <<< "$pair_json")"
          phone_udid="$(jq -er '.phone_udid' <<< "$pair_json")"
          runtime_version="$(jq -er '.runtime_version' <<< "$pair_json")"
          watch_udid="$(jq -er '.watch_udid' <<< "$pair_json")"
          printf '%s\n' \
            "destination=$destination" \
            "pair_udid=$pair_udid" \
            "phone_udid=$phone_udid" \
            "watch_udid=$watch_udid" >> "$GITHUB_OUTPUT"
          echo "Provisioned $WATCH_DEVICE_NAME with $PHONE_DEVICE_NAME on $runtime_version: $pair_udid"

      - name: Run tests
        if: ${{ matrix.result == 'macOS' || matrix.result == 'Mac-UI' }}
        env:
          CONFIGURED_DESTINATION: ${{ matrix.destination }}
          CONFIGURATION: ${{ matrix.configuration }}
          CODE_SIGNING_ALLOWED_VALUE: ${{ matrix.code_signing_allowed }}
          CODE_SIGNING_REQUIRED_VALUE: ${{ matrix.code_signing_required }}
          CODE_SIGN_IDENTITY_VALUE: ${{ matrix.code_sign_identity }}
          DEVELOPMENT_TEAM_VALUE: ${{ matrix.development_team }}
          TEST_RESULT: ${{ matrix.result }}
        run: |
          set -o pipefail

          destination="$CONFIGURED_DESTINATION"

          if [[ -z "$destination" ]]; then
            echo "No test destination was resolved for $TEST_RESULT." >&2
            exit 1
          fi

          test_log="$RUNNER_TEMP/${TEST_RESULT}.xcodebuild.log"
          xcodebuild test \
            -project AgentLimits.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -configuration "$CONFIGURATION" \
            -destination "$destination" \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/${{ matrix.result }}.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-${{ matrix.result }}" \
            CODE_SIGNING_ALLOWED="$CODE_SIGNING_ALLOWED_VALUE" \
            CODE_SIGNING_REQUIRED="$CODE_SIGNING_REQUIRED_VALUE" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_VALUE" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_VALUE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES \
            2>&1 | tee "$test_log"

          if [[ "$TEST_RESULT" == "Mac-UI" ]]; then
            warning_prefix="Publishing changes from within view "
            runtime_warning="${warning_prefix}updates is not allowed"
            if grep -Fq -- "$runtime_warning" "$test_log"; then
              echo "SwiftUI publication-during-update warning detected." >&2
              grep -Fn -- "$runtime_warning" "$test_log" >&2
              exit 1
            fi
          fi

      - name: Build Apple Watch tests
        if: ${{ matrix.result == 'Watch' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          CODE_SIGNING_ALLOWED_VALUE: ${{ matrix.code_signing_allowed }}
          CODE_SIGNING_REQUIRED_VALUE: ${{ matrix.code_signing_required }}
          CODE_SIGN_IDENTITY_VALUE: ${{ matrix.code_sign_identity }}
          DEVELOPMENT_TEAM_VALUE: ${{ matrix.development_team }}
          WATCH_DESTINATION: ${{ steps.watch-pair.outputs.destination }}
        run: |
          set -euo pipefail

          xcodebuild build-for-testing \
            -project AgentLimits.xcodeproj \
            -scheme AgentLimitsWatch \
            -configuration "$CONFIGURATION" \
            -destination "$WATCH_DESTINATION" \
            -parallel-testing-enabled NO \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/Watch-build.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-Watch" \
            CODE_SIGNING_ALLOWED="$CODE_SIGNING_ALLOWED_VALUE" \
            CODE_SIGNING_REQUIRED="$CODE_SIGNING_REQUIRED_VALUE" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_VALUE" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_VALUE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Install and verify Apple Watch test host
        if: ${{ matrix.result == 'Watch' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          WATCH_UDID: ${{ steps.watch-pair.outputs.watch_udid }}
        run: |
          set -euo pipefail

          expected_bundle_id='com.jimboha.agentlimits.ios.watchkitapp'
          watch_app="$RUNNER_TEMP/DerivedData-Watch/Build/Products/$CONFIGURATION-watchsimulator/AgentLimitsWatch.app"
          if [[ ! -d "$watch_app" ]]; then
            echo "Built Watch test host is missing: $watch_app" >&2
            exit 66
          fi
          built_bundle_id="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleIdentifier' \
              "$watch_app/Info.plist"
          )"
          if [[ "$built_bundle_id" != "$expected_bundle_id" ]]; then
            echo "Unexpected built Watch bundle identifier: $built_bundle_id" >&2
            exit 65
          fi

          xcrun simctl install "$WATCH_UDID" "$watch_app"
          installed_app=''
          for (( readiness_attempt = 1; readiness_attempt <= 30; readiness_attempt++ )); do
            if installed_app="$(
              xcrun simctl get_app_container \
                "$WATCH_UDID" \
                "$expected_bundle_id" \
                app 2>/dev/null
            )" && [[ -d "$installed_app" ]]; then
              break
            fi
            installed_app=''
            sleep 1
          done
          if [[ -z "$installed_app" ]]; then
            echo "Installed Watch test host was not registered: $expected_bundle_id" >&2
            exit 69
          fi
          installed_bundle_id="$(
            /usr/libexec/PlistBuddy \
              -c 'Print :CFBundleIdentifier' \
              "$installed_app/Info.plist"
          )"
          if [[ "$installed_bundle_id" != "$expected_bundle_id" ]]; then
            echo "Unexpected installed Watch bundle identifier: $installed_bundle_id" >&2
            exit 65
          fi
          xcrun simctl launch \
            --arch=arm64 \
            --terminate-running-process \
            "$WATCH_UDID" \
            "$expected_bundle_id"
          xcrun simctl terminate "$WATCH_UDID" "$expected_bundle_id"

      - name: Run Apple Watch tests
        if: ${{ matrix.result == 'Watch' }}
        env:
          CONFIGURATION: ${{ matrix.configuration }}
          CODE_SIGNING_ALLOWED_VALUE: ${{ matrix.code_signing_allowed }}
          CODE_SIGNING_REQUIRED_VALUE: ${{ matrix.code_signing_required }}
          CODE_SIGN_IDENTITY_VALUE: ${{ matrix.code_sign_identity }}
          DEVELOPMENT_TEAM_VALUE: ${{ matrix.development_team }}
          WATCH_DESTINATION: ${{ steps.watch-pair.outputs.destination }}
        run: |
          set -euo pipefail

          xcodebuild test-without-building \
            -project AgentLimits.xcodeproj \
            -scheme AgentLimitsWatch \
            -configuration "$CONFIGURATION" \
            -destination "$WATCH_DESTINATION" \
            -parallel-testing-enabled NO \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/Watch.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-Watch" \
            CODE_SIGNING_ALLOWED="$CODE_SIGNING_ALLOWED_VALUE" \
            CODE_SIGNING_REQUIRED="$CODE_SIGNING_REQUIRED_VALUE" \
            CODE_SIGN_IDENTITY="$CODE_SIGN_IDENTITY_VALUE" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM_VALUE" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Upload test result
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-result-${{ matrix.result }}
          path: |
            ${{ runner.temp }}/${{ matrix.result }}.xcresult
            ${{ runner.temp }}/${{ matrix.result }}-build.xcresult
          if-no-files-found: error
          retention-days: 14

      - name: Delete dedicated iOS simulator
        if: ${{ always() && (matrix.result == 'iPhone' || matrix.result == 'iPad') }}
        env:
          IOS_SIMULATOR_UDID: ${{ steps.ios-destination.outputs.udid }}
        run: |
          set -u

          if [[ -z "$IOS_SIMULATOR_UDID" ]]; then
            exit 0
          fi
          uuid_pattern='^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
          if [[ ! "$IOS_SIMULATOR_UDID" =~ $uuid_pattern ]]; then
            echo "Refusing to clean invalid simulator identifier: $IOS_SIMULATOR_UDID" >&2
            exit 65
          fi
          xcrun simctl shutdown "$IOS_SIMULATOR_UDID" >/dev/null 2>&1 || true
          xcrun simctl delete "$IOS_SIMULATOR_UDID"

      - name: Delete dedicated Apple Watch pair
        if: ${{ always() && matrix.result == 'Watch' }}
        env:
          PAIR_UDID: ${{ steps.watch-pair.outputs.pair_udid }}
          PHONE_UDID: ${{ steps.watch-pair.outputs.phone_udid }}
          WATCH_UDID: ${{ steps.watch-pair.outputs.watch_udid }}
        run: |
          set -u

          uuid_pattern='^[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}$'
          for identifier in "$PAIR_UDID" "$PHONE_UDID" "$WATCH_UDID"; do
            if [[ -n "$identifier" && ! "$identifier" =~ $uuid_pattern ]]; then
              echo "Refusing to clean invalid simulator identifier: $identifier" >&2
              exit 65
            fi
          done

          cleanup_status=0
          if [[ -n "$PAIR_UDID" ]]; then
            xcrun simctl unpair "$PAIR_UDID" >/dev/null 2>&1 || true
          fi
          for device_udid in "$WATCH_UDID" "$PHONE_UDID"; do
            if [[ -z "$device_udid" ]]; then
              continue
            fi
            xcrun simctl shutdown "$device_udid" >/dev/null 2>&1 || true
            if ! xcrun simctl delete "$device_udid"; then
              cleanup_status=1
            fi
          done
          exit "$cleanup_status"

  analyze:
    name: Analyze — ${{ matrix.name }}
    needs: source-gates
    runs-on: macos-26
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            scheme: AgentLimits
            destination: generic/platform=macOS
            result: Analyze-macOS
          - name: macOS widget
            scheme: AgentLimitsWidgetExtension
            destination: generic/platform=macOS
            result: Analyze-Widget
          - name: iOS and embedded Watch
            scheme: AgentLimitsiOS
            destination: generic/platform=iOS
            result: Analyze-iOS
          - name: standalone Watch
            scheme: AgentLimitsWatch
            destination: generic/platform=watchOS
            result: Analyze-Watch
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run static analyzer
        run: |
          xcodebuild analyze \
            -project AgentLimits.xcodeproj \
            -scheme "${{ matrix.scheme }}" \
            -configuration Release \
            -destination "${{ matrix.destination }}" \
            -onlyUsePackageVersionsFromResolvedFile \
            -resultBundlePath "$RUNNER_TEMP/${{ matrix.result }}.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData-${{ matrix.result }}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY= \
            DEVELOPMENT_TEAM= \
            COMPILER_INDEX_STORE_ENABLE=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=YES \
            GCC_TREAT_WARNINGS_AS_ERRORS=YES

      - name: Upload analyzer result
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.result }}
          path: ${{ runner.temp }}/${{ matrix.result }}.xcresult
          if-no-files-found: error
          retention-days: 14

  unsigned-release-preflight:
    name: Unsigned Release preflight
    needs:
      - source-gates
      - tests
      - analyze
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Lock and select canonical Xcode
        run: |
          sudo chmod 0755 /Applications
          canonical_developer_dir="$(cd "$DEVELOPER_DIR" && pwd -P)"
          if [[ ! "$canonical_developer_dir" =~ ^/Applications/[A-Za-z0-9._+-]+\.app/Contents/Developer$ ]]; then
            echo "Selected Xcode resolved outside the expected app-bundle path" >&2
            exit 69
          fi
          xcode_bundle="${canonical_developer_dir%/Contents/Developer}"
          sudo chown -R root:wheel "$xcode_bundle"
          sudo chmod -RN "$xcode_bundle"
          sudo chmod -R go-w "$xcode_bundle"
          sudo chmod 0755 \
            "$xcode_bundle" \
            "$xcode_bundle/Contents" \
            "$canonical_developer_dir" \
            "$canonical_developer_dir/usr" \
            "$canonical_developer_dir/usr/bin" \
            "$canonical_developer_dir/usr/bin/xcodebuild"
          echo "Canonical Xcode trust metadata after hardening:"
          /usr/bin/stat -f '%Su:%Sg %Lp %N' \
            "$xcode_bundle" \
            "$xcode_bundle/Contents" \
            "$canonical_developer_dir" \
            "$canonical_developer_dir/usr" \
            "$canonical_developer_dir/usr/bin" \
            "$canonical_developer_dir/usr/bin/xcodebuild"
          remaining_untrusted_xcode_entry="$(
            sudo /usr/bin/find -x "$xcode_bundle" \
              \( ! -uid 0 -o -perm -0022 -o -acl \) \
              -print -quit
          )"
          if [[ -n "$remaining_untrusted_xcode_entry" ]]; then
            echo "Canonical Xcode hardening left an untrusted entry:" >&2
            sudo /usr/bin/stat -f '%Su:%Sg %Lp %N' \
              "$remaining_untrusted_xcode_entry" >&2
            exit 69
          fi
          printf 'DEVELOPER_DIR=%s\n' "$canonical_developer_dir" >> "$GITHUB_ENV"

      - name: Build and inspect unsigned release artifacts
        run: |
          Scripts/build-unsigned-artifacts.sh "$RUNNER_TEMP/preflight"
          cd "$RUNNER_TEMP/preflight"
          shasum -a 256 -c SHA256SUMS

      - name: Upload non-distributable build evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unsigned-release-preflight-evidence
          path: |
            ${{ runner.temp }}/preflight/BUILD-METADATA.txt
            ${{ runner.temp }}/preflight/SHA256SUMS
            ${{ runner.temp }}/preflight/build-macOS.log
            ${{ runner.temp }}/preflight/build-iOS-watchOS.log
          if-no-files-found: error
          retention-days: 14
